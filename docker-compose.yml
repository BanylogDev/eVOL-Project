version: '3.9'

services:
  nginx:
    container_name: nginx-lb
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - evol.api1
      - evol.api2
      - evol.api3
    networks:
      - evol-network
    restart: unless-stopped

  evol.api1:
    container_name: evol.api1
    build:
      context: ./src/eVOL.Api
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      evol.postgres:
        condition: service_healthy
      evol.redis:
        condition: service_started
      evol.mongodb:
        condition: service_started
      evol.seq:
        condition: service_started
    networks:
      - evol-network
    expose:
      - "8080"
    environment:
      - DOTNET_URLS=http://0.0.0.0:8080
    restart: unless-stopped

  evol.api2:
    container_name: evol.api2
    build:
      context: ./src/eVOL.Api
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      evol.postgres:
        condition: service_healthy
      evol.redis:
        condition: service_started
      evol.mongodb:
        condition: service_started
      evol.seq:
        condition: service_started
    networks:
      - evol-network
    expose:
      - "8080"
    environment:
      - DOTNET_URLS=http://0.0.0.0:8080
    restart: unless-stopped

  evol.api3:
    container_name: evol.api3
    build:
      context: ./src/eVOL.Api
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      evol.postgres:
        condition: service_healthy
      evol.redis:
        condition: service_started
      evol.mongodb:
        condition: service_started
      evol.seq:
        condition: service_started
    networks:
      - evol-network
    expose:
      - "8080"
    ports:
      - "8083:8080"
    environment:
      - DOTNET_URLS=http://0.0.0.0:8080
    restart: unless-stopped

  evol.postgres:
    container_name: evol.postgres
    image: postgres:16
    environment:
      POSTGRES_USER: evol_user
      POSTGRES_PASSWORD: evol_password
      POSTGRES_DB: evol_db
    ports:
      - "5433:5432"
    volumes:
      - evol-postgres-data:/var/lib/postgresql/data
    networks:
      - evol-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evol_user -d evol_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  evol.mongodb:
    container_name: evol.mongodb
    image: mongo:6
    environment:
      MONGO_INITDB_ROOT_USERNAME: evol_user
      MONGO_INITDB_ROOT_PASSWORD: evol_password
      MONGO_INITDB_DATABASE: evol_chat_db
    ports:
      - "27018:27017"
    volumes:
      - evol-mongodb-data:/data/db
    networks:
      - evol-network
    restart: unless-stopped

  evol.redis:
    container_name: evol.redis
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - evol-redis-data:/data
    networks:
      - evol-network
    restart: unless-stopped

  evol.seq:
    container_name: evol.seq
    image: datalust/seq:latest
    ports:
      - "5341:80"
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_ADMINPASSWORD=1234
    volumes:
      - evol-seq-data:/data
    networks:
      - evol-network
    restart: unless-stopped

  evol.rabbitmq:
    container_name: evol.rabbitmq
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - evol-network
    restart: unless-stopped

volumes:
  evol-postgres-data:
  evol-mongodb-data:
  evol-redis-data:
  evol-seq-data:

networks:
  evol-network:
    driver: bridge
